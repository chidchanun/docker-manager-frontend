<main class="min-h-dvh bg-[#070b14] p-4 text-slate-200 sm:p-8"><div class="mx-auto max-w-6xl"><header class="mb-6 flex items-center justify-between"><div><a class="text-sm text-blue-400" routerLink="/dashboard">← Dashboard</a><h1 class="mt-2 text-3xl font-bold text-white">Audit Log</h1></div><button class="rounded-lg border border-slate-700 px-4 py-2" (click)="load()">Refresh</button></header>@if(error()){<div class="mb-4 rounded-lg bg-red-500/10 p-4 text-red-300">{{error()}}</div>}<section class="overflow-hidden rounded-2xl border border-slate-800 bg-slate-900"><div class="overflow-x-auto"><table class="w-full min-w-[760px] text-left text-sm"><thead class="bg-slate-950 text-slate-500"><tr><th class="p-4">Time</th><th>User</th><th>Action</th><th>Container</th><th>IP</th><th>Status</th></tr></thead><tbody class="divide-y divide-slate-800">@for(item of items();track item.id){<tr><td class="p-4 whitespace-nowrap">{{item.time}}</td><td>{{item.user}}</td><td>{{item.action}}</td><td class="max-w-48 truncate">{{item.container}}</td><td>{{item.ip}}</td><td><span [class.text-emerald-400]="item.success" [class.text-red-400]="!item.success">{{item.status}}</span></td></tr>}@empty{<tr><td colspan="6" class="p-12 text-center text-slate-500">ยังไม่มี Audit log</td></tr>}</tbody></table></div></section></div></main>
