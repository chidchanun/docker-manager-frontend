<div class="pointer-events-none fixed right-4 top-4 z-[100] grid w-[calc(100%-2rem)] max-w-sm gap-3" aria-live="polite">@for(item of toast.messages();track item.id){<div class="pointer-events-auto flex items-start gap-3 rounded-xl border bg-slate-900 p-4 shadow-2xl" [class.border-emerald-500/40]="item.kind==='success'" [class.border-red-500/40]="item.kind==='error'" [class.border-blue-500/40]="item.kind==='info'"><span class="font-bold" [class.text-emerald-400]="item.kind==='success'" [class.text-red-400]="item.kind==='error'" [class.text-blue-400]="item.kind==='info'">{{item.kind==='success'?'✓':item.kind==='error'?'!':'i'}}</span><p class="min-w-0 flex-1 text-sm text-slate-200">{{item.text}}</p><button class="text-slate-500 hover:text-white" (click)="toast.dismiss(item.id)" aria-label="ปิด">×</button></div>}</div>
